apiVersion: v1
kind: Service
metadata:
  name: etl-agent-api-service
  namespace: etl-agent
  labels:
    app: etl-agent-api
spec:
  type: LoadBalancer
  selector:
    app: etl-agent-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
