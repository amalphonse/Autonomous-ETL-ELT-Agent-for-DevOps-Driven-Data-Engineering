apiVersion: v1
kind: Namespace
metadata:
  name: etl-agent

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etl-agent
  namespace: etl-agent

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: etl-agent
data:
  github-repo-owner: "amalphonse"
  github-repo-name: "Autonomous-ETL-ELT-Agent-for-DevOps-Driven-Data-Engineering"

---
apiVersion: v1
kind: Secret
metadata:
  name: etl-secrets
  namespace: etl-agent
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual values before deploying
  # Run: kubectl create secret generic etl-secrets -n etl-agent --from-literal=...
  database-url: "postgresql://user:password@postgres-service:5432/etl_agent_db"
  openai-api-key: "sk-your-openai-api-key-here"
  github-token: "ghp_your-github-token-here"
  api-key: "your-secure-api-key-here"
